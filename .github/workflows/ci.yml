name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 매일 자정(UTC) 정기 회귀 테스트
    - cron: '0 0 * * *'

permissions:
  pull-requests: write

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json --reporter=verbose

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          MAX_SIZE_KB=50
          # dist/assets 내 JS 번들 크기 합산
          TOTAL_SIZE=$(find dist/assets -name '*.js' -exec wc -c {} + | tail -1 | awk '{print $1}')
          TOTAL_KB=$((TOTAL_SIZE / 1024))
          echo "Total JS bundle size: ${TOTAL_KB}KB"
          if [ "$TOTAL_KB" -gt "$MAX_SIZE_KB" ]; then
            echo "::warning::Bundle size ${TOTAL_KB}KB exceeds ${MAX_SIZE_KB}KB threshold"
          else
            echo "Bundle size is within the ${MAX_SIZE_KB}KB limit."
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # PR 코멘트에 커버리지 요약 게시
      - name: Coverage summary comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
