name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          BASE_URL: /game_001/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 배포 후 URL 헬스체크
      - name: Health check deployed site
        run: |
          DEPLOY_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Checking deployed URL: ${DEPLOY_URL}"
          # 최대 5회 재시도 (10초 간격) — Pages CDN 전파 대기
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${DEPLOY_URL}")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Health check failed — site did not return HTTP 200 after 5 attempts"
          exit 1
